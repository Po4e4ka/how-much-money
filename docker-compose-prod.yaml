services:
  hmm-laravel:
    container_name: hmm-laravel
    build:
      dockerfile: containers/prod.Dockerfile
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        USER_NAME: unit
    volumes:
      - ./:/var/www
      - ./containers/configs/php/php.ini:/usr/local/etc/php/conf.d/php.ini
      - ./containers/configs/unit/unit.json:/docker-entrypoint.d/unit.json:ro
    entrypoint: /docker-entrypoint.d/entrypoint.sh
    command:
      - "unitd"
      - "--no-daemon"
      - "--control"
      - "unix:/var/run/control.unit.sock"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      - "traefik.http.routers.hmm.rule=Host(`how-much-money.ru`)"
      - "traefik.http.routers.hmm.entrypoints=websecure"
      - "traefik.http.routers.hmm.tls.certresolver=letsencrypt"

      - "traefik.http.routers.hmm-www.rule=Host(`www.how-much-money.ru`)"
      - "traefik.http.routers.hmm-www.entrypoints=websecure"
      - "traefik.http.routers.hmm-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hmm-www.middlewares=hmm-www-redirect"
      - "traefik.http.routers.hmm-www.service=noop@internal"

      - "traefik.http.middlewares.hmm-www-redirect.redirectregex.regex=^https?://www\\.how-much-money\\.ru/?(.*)"
      - "traefik.http.middlewares.hmm-www-redirect.redirectregex.replacement=https://how-much-money.ru/$${1}"
      - "traefik.http.middlewares.hmm-www-redirect.redirectregex.permanent=true"

      - "traefik.http.services.hmm.loadbalancer.server.port=80"
    networks:
      - web
      - hmm_net

  hmm-cron:
    container_name: hmm-cron
    build:
      dockerfile: containers/prod-cron.Dockerfile
    volumes:
      - ./containers/configs/cron/crontab.txt:/tmp/hmm-cron-src:ro
      - ./containers/configs/cron/commands:/var/commands:ro
      - ./database.sqlite:/shared/database.sqlite
      - ./var/logs/cron/cron.log:/var/log/cron.log
      - ./.env:/var/.env:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - '.env'
    environment:
      TZ: ${TZ:-UTC}
    networks:
      - hmm_net
    command:
      - sh
      - -c
      - "cp /tmp/hmm-cron-src /etc/cron.d/hmm-cron && chown root:root /etc/cron.d/hmm-cron && chmod 0644 /etc/cron.d/hmm-cron && cron && exec tail -F /var/log/cron.log"

networks:
  web:
    external: true
  hmm_net:
    internal: false
